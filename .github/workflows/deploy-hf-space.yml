name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment settings
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_ID" ]; then
            echo "HF_SPACE_ID is not configured."
            exit 1
          fi

          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is not configured."
            exit 1
          fi

      - name: Push to Hugging Face Space
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git remote add hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push --force hf HEAD:main
